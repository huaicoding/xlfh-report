<style>
  :root{--bg:#0f1420;--panel:#161c2b;--line:#26304a;--txt:#d6deee;--sub:#8a97b3;--red:#ef4444;--green:#22c55e;--accent:#4f8cff;}

  .controls{padding:6px 18px 0;} select{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:14px;}

  #stockList{width:230px;flex:none;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:auto;max-height:640px;}
  .stock{padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--line);}
  .stock:hover{background:#1d2740;} .stock.active{background:#233152;border-left:3px solid var(--accent);}
  .stock .code{font-weight:600;} .stock .meta{color:var(--sub);font-size:12px;} .stock .note{color:#f59e0b;}
  .chartArea{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 10px;min-width:0;}
  .chartHeader{display:flex;justify-content:space-between;align-items:center;padding:2px 4px 8px;}
  #chartTitle{font-weight:600;} #chart{width:100%;height:600px;}
  .empty{color:var(--sub);padding:40px;text-align:center;}
  /* ---- 手机窄屏优化：仅 ≤640px 生效，桌面布局完全不变 ---- */
  @media (max-width:640px){
    h1{font-size:16px;padding:12px 14px;}
    .boards{padding:12px 14px;gap:10px;}
    .board{min-width:0;flex:1 1 100%;}       /* 两个板块卡片纵向堆叠、占满宽度 */
    .controls{padding:6px 14px 0;}
    .main{flex-direction:column;padding:10px 14px 16px;gap:10px;}  /* 列表在上、K线在下 */
    #stockList{width:100%;flex:none;max-height:180px;}             /* 列表全宽、限高可滚 */
    .chartArea{padding:8px;}
    #chart{height:460px;}                     /* K线拿到全屏宽度，一屏同时看到列表+图 */
    .chartHeader{flex-wrap:wrap;gap:6px;}
  }

<script>
const D = window.DATA;
document.getElementById('hdrDate').textContent = D.date;

// ---- 板块表格 ----
function boardTable(rows){
  if(!rows || !rows.length) return '<div class="empty">获取失败或无数据</div>';
  let h = '<table><tr><th>名称</th><th>涨跌幅</th><th>家数</th><th>领涨股(涨幅)</th></tr>';
  for(const r of rows){
    const cls = r.pct>=0?'up':'down';
    const lcls = r.leader_pct>=0?'up':'down';
    h += `<tr><td>${r.name}</td><td class="${cls}">${r.pct.toFixed(2)}%</td>`+
         `<td>${r.count}家</td><td>${r.leader} <span class="${lcls}">${r.leader_pct>=0?'+':''}${r.leader_pct.toFixed(2)}%</span></td></tr>`;
  }
  return h+'</table>';
}
document.getElementById('boardIndustry').innerHTML = boardTable(D.boards.industry);
document.getElementById('boardConcept').innerHTML  = boardTable(D.boards.concept);

// ---- 策略下拉 ----
const stratSel = document.getElementById('stratSel');
for(const name of Object.keys(D.strategies)){
  const n = D.strategies[name].length;
  const opt = document.createElement('option');
  opt.value = name; opt.textContent = `${name} (${n})`;
  stratSel.appendChild(opt);
}

let curCode = null;
const chart = echarts.init(document.getElementById('chart'), 'dark');
window.addEventListener('resize', ()=>chart.resize());

function renderStockList(){
  const list = D.strategies[stratSel.value] || [];
  const box = document.getElementById('stockList');
  if(!list.length){ box.innerHTML = '<div class="empty">该策略今日无选股</div>'; return; }
  box.innerHTML = list.map(s=>
    `<div class="stock" data-code="${s.code}">
       <div class="code">${s.code} ${s.name} <span class="note">${s.note||''}</span></div>
       <div class="meta">${s.industry||''}</div>
     </div>`).join('');
  box.querySelectorAll('.stock').forEach(el=>{
    el.onclick = ()=>{
      box.querySelectorAll('.stock').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      showStock(el.dataset.code, el.querySelector('.code').textContent.trim());
    };
  });
}

function buildOption(code, title, sub){
  const d = D.kline[code];
  if(!d) return {title:{text:'无数据',left:'center',top:'center',textStyle:{color:'#8a97b3'}}};
  const series = [
    {name:'K线', type:'candlestick', data:d.kline,
     itemStyle:{color:'#ef4444',color0:'#22c55e',borderColor:'#ef4444',borderColor0:'#22c55e'}},
    {name:'MA5',  type:'line', data:d.ma5,  smooth:true, showSymbol:false, lineStyle:{width:1}},
    {name:'MA20', type:'line', data:d.ma20, smooth:true, showSymbol:false, lineStyle:{width:1}},
    {name:'MA360',type:'line', data:d.ma360,smooth:true, showSymbol:false, lineStyle:{width:1}},
  ];
  if(sub==='macd'){
    series.push({name:'MACD', type:'bar', xAxisIndex:1, yAxisIndex:1, data:d.macd,
      itemStyle:{color:p=>p.data>=0?'#ef4444':'#22c55e'}});
    series.push({name:'DIF', type:'line', xAxisIndex:1, yAxisIndex:1, data:d.dif, showSymbol:false, lineStyle:{width:1}});
    series.push({name:'DEA', type:'line', xAxisIndex:1, yAxisIndex:1, data:d.dea, showSymbol:false, lineStyle:{width:1}});
  } else {
    series.push({name:'成交量', type:'bar', xAxisIndex:1, yAxisIndex:1, data:d.vol});
  }
  return {
    animation:false,
    legend:{data:['MA5','MA20','MA360'], top:0, textStyle:{color:'#8a97b3'}},
    tooltip:{trigger:'axis', axisPointer:{type:'cross'}},
    axisPointer:{link:[{xAxisIndex:'all'}]},
    grid:[{left:55,right:20,top:34,height:'60%'},{left:55,right:20,top:'74%',height:'16%'}],
    xAxis:[
      {type:'category', data:d.dates, boundaryGap:false, axisLine:{onZero:false}, splitLine:{show:false}},
      {type:'category', gridIndex:1, data:d.dates, axisLabel:{show:false}, axisTick:{show:false}, axisLine:{onZero:false}}
    ],
    yAxis:[
      {scale:true, splitArea:{show:false}},
      {gridIndex:1, scale:true, splitNumber:2, axisLabel:{show:true}, splitLine:{show:false}}
    ],
    dataZoom:[
      {type:'inside', xAxisIndex:[0,1], start:55, end:100},
      {type:'slider', xAxisIndex:[0,1], bottom:2, start:55, end:100}
    ],
    series
  };
}

function showStock(code, title){
  curCode = code;
  document.getElementById('chartTitle').textContent = title;
  chart.setOption(buildOption(code, title, document.getElementById('subSel').value), true);
}

stratSel.onchange = renderStockList;
document.getElementById('subSel').onchange = ()=>{ if(curCode) showStock(curCode, document.getElementById('chartTitle').textContent); };

// 初始化：选第一个有票的策略
(function init(){
  const names = Object.keys(D.strategies);
  const firstWith = names.find(n=>D.strategies[n].length) || names[0];
  if(firstWith){ stratSel.value = firstWith; }
  renderStockList();
})();
</script>
